# 本月選題說明（每月月會後填寫）
選題說明:
  掃描日期: "2026-05-27"
  本月選定產業:
    - "AI 伺服器供應鏈"
    - "HBM 記憶體 / CoWoS 封裝"
    - "Custom Silicon 崛起（AVGO/TSM）"
  選題理由:
    - "AI 伺服器供應鏈：本月掃描前三大熱點主題（HBM、Capex、Custom Silicon）均指向此產業。CSP CapEx 持續上修，中游供應鏈如台達電、賿聯可能尚未充分反映。"
    - "HBM 記憶體：HBM 市場規模破兆帶動 Reddit / HN 大量討論，SK Hynix 供應鏈定價能力強，台積電 CoWoS 封裝產能拘緋可能尚未充分反映。"
    - "Custom Silicon：AVGO / TSM 自設晶片語報熱度升溫，CSP 自行設計趨勢對 NVIDIA 構成長期競爭，台積電封裝產能為關鍵分析點。"
  排除的熱門話題:
    - "SOX+65% YTD 估値泡沫辦論：市場討論熱度高但結論分散，本月可先居觀。"
    - "RISC-V 開源矽 + 半導體製造業自動化：5-10 年長期主題，目前投資機會不清晰，適合下季備研。"

